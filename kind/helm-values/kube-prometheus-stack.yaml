# kube-prometheus-stack - kind 로컬 환경용
# 리소스를 최소화하여 로컬에서 가볍게 동작

grafana:
  enabled: false   # 시각화는 우리 서비스가 담당

prometheus:
  prometheusSpec:
    retention: 6h

    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 300m
        memory: 512Mi

    storageSpec: {}

alertmanager:
  enabled: false

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true
