name: Terraform CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "terraform/**"

permissions:
  contents: read
  pull-requests: write  # PR 코멘트 작성용

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Validate
        id: validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan
        continue-on-error: true

      # PR에 plan 결과 코멘트로 자동 게시
      - name: Comment Plan Result on PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            // 이전 plan 코멘트 삭제 (중복 방지)
            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Terraform Plan Result')
            );
            if (botComment) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
              });
            }

            const fmt     = '${{ steps.fmt.outcome }}';
            const validate = '${{ steps.validate.outcome }}';
            const plan    = '${{ steps.plan.outcome }}';

            const output = `### Terraform Plan Result

            | 단계 | 결과 |
            |---|---|
            | Format | ${fmt === 'success' ? '✅' : '⚠️ 포맷 오류'} |
            | Validate | ${validate === 'success' ? '✅' : '❌ 실패'} |
            | Plan | ${plan === 'success' ? '✅' : '❌ 실패'} |

            <details>
            <summary>Plan 상세 보기</summary>

            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\`
            </details>

            > 실제 적용은 PR 머지 후 **Actions → Terraform Apply** 에서 수동으로 진행하세요.
            `;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: output,
            });

      - name: Check Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1
