name: Terraform Apply (CD)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "'apply' 라고 입력해야 실행됩니다"
        required: true
        type: string

permissions:
  contents: read

jobs:
  guard:
    name: Confirm Check
    runs-on: ubuntu-latest
    steps:
      - name: Check confirm input
        if: ${{ github.event.inputs.confirm != 'apply' }}
        run: |
          echo "❌ 확인 문자열이 올바르지 않습니다. 'apply' 를 입력하세요."
          exit 1

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: guard
    environment: production  # GitHub Environment 보호 규칙 적용 (승인자 설정 가능)

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve
